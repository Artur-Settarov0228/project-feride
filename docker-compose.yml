version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/masion_feride.db:/app/masion_feride.db
    environment:
      - DATABASE_URL=sqlite:///./masion_feride.db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python3 bot.py
    depends_on:
      - backend
    volumes:
      - ./backend/masion_feride.db:/app/masion_feride.db
    restart: always
